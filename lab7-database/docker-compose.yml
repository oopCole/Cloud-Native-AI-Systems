services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lab7}
      POSTGRES_USER: ${POSTGRES_USER:-lab7}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab7-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  backend:
    build:
      context: ./backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lab7:lab7-password@db:5432/lab7}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_BASE_URL: http://backend:8000
      DEV_JWT_TOKEN: ${DEV_JWT_TOKEN:-dev-token}
    depends_on:
      - backend

volumes:
  pgdata:

